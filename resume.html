<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hlawn — Resume</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🫶</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: #f2f2f7;
            height: 100dvh;
            overflow: hidden;
        }
        .resume-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 448px;
            margin: 0 auto;
        }
        .resume-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            flex-shrink: 0;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.04);
            color: #333;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .back-btn:active { background: rgba(0,0,0,0.1); }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.04);
            color: #333;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.2s;
            text-decoration: none;
        }
        .download-btn:active { background: rgba(0,0,0,0.1); }
        .pdf-container {
            flex: 1;
            padding: 0 24px 24px;
        }
        .pdf-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="resume-shell">
        <div class="resume-header">
            <a class="back-btn" href="index.html">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                Back
            </a>
            <a class="download-btn" href="assets/resume.pdf" download>
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3"/></svg>
                Download
            </a>
        </div>
        <div class="pdf-container">
            <iframe src="assets/resume.pdf"></iframe>
        </div>
    </div>
</body>
</html>
